<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Welcome — Jeoan Gwyneth 🎀</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Lato:wght@300;400&family=Pinyon+Script&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="styles.css"/>
<style>
/* ═══════════════════════════════════════════════════════════════
   welcome.html — Welcome / Landing Page (after login)
   ═══════════════════════════════════════════════════════════════ */

body{
  background:linear-gradient(150deg,#f5c8d8 0%,#fce8ee 40%,#f0b8c8 80%,#fce8ee 100%);
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  overflow:hidden;
}

.welcome-petals{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:0}

.welcome-card{
  position:relative;z-index:1;
  background:rgba(255,248,250,0.72);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border:1.5px solid rgba(255,255,255,.85);
  border-radius:28px;padding:36px 32px 30px;text-align:center;
  max-width:340px;width:90%;
  box-shadow:0 20px 60px rgba(201,79,106,.18),0 4px 16px rgba(201,79,106,.1);
  animation:cardIn .6s cubic-bezier(.34,1.56,.64,1) both;
}

.welcome-bow{font-size:34px;display:block;margin-bottom:10px;animation:sway 3s ease-in-out infinite}
.welcome-name{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;color:var(--pink-deep);line-height:1.2;margin-bottom:4px}
.welcome-greeting{font-family:'Playfair Display',serif;font-size:15px;font-style:italic;color:var(--mauve);margin-bottom:4px}
.welcome-script{font-family:'Pinyon Script',cursive;font-size:22px;color:var(--mauve);margin-bottom:10px}
.welcome-divider{width:60px;height:1.5px;background:linear-gradient(90deg,transparent,var(--pink),transparent);margin:0 auto 12px}
.welcome-tagline{font-size:13px;color:var(--mauve);line-height:1.6;margin-bottom:6px}
.welcome-loc{
  display:inline-flex;align-items:center;gap:4px;
  background:rgba(255,255,255,.75);border:1px solid var(--border);
  border-radius:100px;padding:4px 14px;font-size:12px;color:var(--pink-deep);
  margin-bottom:22px;
}

.btn-book{
  width:100%;padding:14px 24px;
  background:linear-gradient(135deg,var(--pink),var(--pink-deep));
  border:none;border-radius:14px;
  color:#fff;font-family:'Lato',sans-serif;
  font-size:14px;font-weight:400;letter-spacing:2.5px;text-transform:uppercase;
  cursor:pointer;transition:all .2s;
  box-shadow:0 8px 22px rgba(201,79,106,.4);
}
.btn-book:hover{transform:translateY(-2px);box-shadow:0 12px 28px rgba(201,79,106,.5)}
.btn-book:active{transform:scale(.98)}

.welcome-note{margin-top:14px;font-size:11px;color:var(--muted);line-height:1.5}
</style>
</head>
<body>

<!-- ══════════════ WELCOME CARD ══════════════ -->
<div class="welcome-petals" id="welcomePetals"></div>
<div class="welcome-card">
  <span class="welcome-bow">🎀</span>
  <div class="welcome-greeting" id="welcomeGreeting">Hello! 💕</div>
  <div class="welcome-name">Jeoan Gwyneth<br>Dajay Gran</div>
  <div class="welcome-script">Singer for Hire</div>
  <div class="welcome-divider"></div>
  <div class="welcome-tagline">Making your special moments<br>truly unforgettable ✨</div>
  <div class="welcome-loc">📍 South Cotabato Based</div>
  <button class="btn-book" onclick="window.location.href='booking.html'">🎀 &nbsp; Book Me Now</button>
  <div class="welcome-note">Fill out the form and I'll reach out to confirm your booking 💕</div>
  <button class="btn-logout" onclick="confirmLogout()">Sign Out</button>
</div>

<!-- ══════════════ LOGOUT CONFIRM MODAL ══════════════ -->
<div class="modal-overlay" id="logoutModal">
  <div class="modal-box">
    <span class="modal-icon">🎀</span>
    <div class="modal-title">Sign Out?</div>
    <div class="modal-msg">Are you sure you want to sign out? You can always come back and book again! 💕</div>
    <div class="modal-actions">
      <button class="modal-btn-cancel" onclick="closeLogoutModal()">Stay</button>
      <button class="modal-btn-confirm" onclick="doLogout()">Sign Out</button>
    </div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════════
   welcome.js (inline) — Auth guard + greeting
   ═══════════════════════════════════════════════════════════════ */

const clientToken       = sessionStorage.getItem('client_token');
const clientDisplayName = sessionStorage.getItem('client_display_name') || '';
const clientUsername    = sessionStorage.getItem('client_username')    || '';

// Guard: redirect to login if no session
if (!clientToken) {
  window.location.href = 'login.html';
}

// Set personalised greeting
document.getElementById('welcomeGreeting').textContent =
  'Hello, ' + (clientDisplayName || clientUsername) + '! 💕';

// Spawn petals
(function spawnWelcomePetals() {
  const pc = document.getElementById('welcomePetals');
  ['🌸','🌸','🌷','🌸','🌺','🌸','🌷','🌸','🌸','🌷'].forEach(p => {
    const count = p === '🌸' ? 7 : 4;
    for (let i = 0; i < count; i++) {
      const el = document.createElement('div');
      el.className = 'petal';
      el.textContent = p;
      el.style.left = Math.random() * 100 + '%';
      el.style.setProperty('--sz', (13 + Math.random() * 13) + 'px');
      el.style.setProperty('--dur', (5  + Math.random() * 6)  + 's');
      el.style.setProperty('--del', (Math.random() * 8)       + 's');
      pc.appendChild(el);
    }
  });
})();

// ── Logout ──
function confirmLogout() { document.getElementById('logoutModal').classList.add('show'); }
function closeLogoutModal() { document.getElementById('logoutModal').classList.remove('show'); }
function doLogout() {
  sessionStorage.clear();
  window.location.href = 'login.html';
}
</script>
</body>
</html>
