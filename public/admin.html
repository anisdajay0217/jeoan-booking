<!DOCTYPE html>
<html lang="en">
<head>  <link rel="stylesheet" href="admin-styles.css"/>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>Jeoan Admin 🎀</title>
  <link rel="stylesheet" href="admin-styles.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
</head>
<body>
<script src="admin-scripts.js"></script>
<div id="loginPage">
  <div class="login-petals" id="loginPetals"></div>
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-brand">
        <span class="login-icon">🎀</span>
        <div class="login-title">Jeoan Gwyneth</div>
        <div class="login-sub">Booking Admin</div>
      </div>
      <div class="form-field">
        <label>Password</label>
        <input type="password" id="passwordInput" placeholder="Enter admin password" autocomplete="current-password"/>
      </div>
      <button class="btn-login" onclick="doLogin()">🔑 &nbsp; Sign In</button>
      <div class="login-error" id="loginError">Incorrect password. Please try again.</div>
    </div>
  </div>
</div>

<script src="admin-scripts.js"></script>
</body>
</html>
