<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>Login — Jeoan Gwyneth 🎀</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="client-styles.css"/>
</head>
<body>

<!-- LOGIN PAGE -->
<div id="loginPage">
  <div class="login-petals" id="loginPetals"></div>
  <div class="login-card">
    <span class="login-icon">🎀</span>
    <div class="login-title">Hello po!</div>
    <div class="login-sub">Use the account Jeoan made for you 💕</div>
    <div class="login-field">
      <label>Username</label>
      <input type="text" id="loginUsername" placeholder="Your username" autocomplete="username"/>
    </div>
    <div class="login-field">
      <label>Password</label>
      <input type="password" id="loginPassword" placeholder="Your password" autocomplete="current-password"
             onkeydown="if(event.key==='Enter') doClientLogin()"/>
    </div>
    <button class="btn-login" id="loginBtn" onclick="doClientLogin()">🔑 &nbsp; Sign In</button>
    <div class="login-error" id="loginError">Incorrect username or password.</div>
    <div class="login-note">Don't have an account? Contact Jeoan and she'll set one up for you! 🌸</div>
  </div>
</div>

<script>
  const API_BASE = window.location.origin;

  (function init() {
    spawnLoginPetals();
    // If already logged in, go straight to dashboard
    if (sessionStorage.getItem('client_token')) {
      window.location.href = 'clientdashboard.html';
    }
  })();

  async function doClientLogin() {
    const username = document.getElementById('loginUsername').value.trim();
    const password = document.getElementById('loginPassword').value;
    const errEl    = document.getElementById('loginError');
    const btn      = document.getElementById('loginBtn');
    errEl.classList.remove('show');

    if (!username || !password) {
      errEl.textContent = 'Please enter your username and password.';
      errEl.classList.add('show'); return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Signing in…';

    try {
      const res  = await fetch(API_BASE + '/client/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();

      if (!res.ok) {
        errEl.textContent = data.error || 'Login failed. Please try again.';
        errEl.classList.add('show');
        btn.disabled = false;
        btn.innerHTML = '🔑 &nbsp; Sign In';
        return;
      }

      sessionStorage.setItem('client_token',        data.token);
      sessionStorage.setItem('client_display_name', data.displayName);
      sessionStorage.setItem('client_username',     data.username);

      // Redirect to dashboard
      window.location.href = 'clientdashboard.html';

    } catch (e) {
      errEl.textContent = 'Cannot connect to server. Please try again.';
      errEl.classList.add('show');
      btn.disabled = false;
      btn.innerHTML = '🔑 &nbsp; Sign In';
    }
  }

  function spawnLoginPetals() {
    const pc = document.getElementById('loginPetals');
    if (!pc) return;
    ['🌸','🌸','🌷','🌸','🌺','🌸','🌷'].forEach(p => {
      for (let i = 0; i < (p === '🌸' ? 5 : 3); i++) {
        const el = document.createElement('div');
        el.className = 'petal';
        el.textContent = p;
        el.style.left = Math.random() * 100 + '%';
        el.style.setProperty('--sz',  (13 + Math.random() * 12) + 'px');
        el.style.setProperty('--dur', (5  + Math.random() * 6)  + 's');
        el.style.setProperty('--del', (Math.random() * 8)       + 's');
        pc.appendChild(el);
      }
    });
  }
</script>
</body>
</html>
