/* Paste inside your <style> tag */

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --pink:#e8728a;--pink-deep:#c94f6a;--pink-pale:#fce8ee;
  --pink-light:#fdf0f4;--blush:#f7d6e0;--mauve:#b07080;
  --ribbon:#d45c78;--cream:#fff8fa;--text:#3a1f28;
  --muted:#b08090;--border:#f0c8d4;--white:#ffffff;
  --green:#1a7a50;--green-pale:#e8f5ee;--green-border:#9dd4b8;
  --red:#c0392b;--red-pale:#fdecea;--red-border:#f5b8b0;
  --orange:#d4722a;--orange-pale:#fef3e8;--orange-border:#f5cca0;
  --amber:#b8860b;--amber-pale:#fef8e4;--amber-border:#f0d890;
}
body{background:var(--cream);color:var(--text);font-family:'Lato',sans-serif;font-weight:300;min-height:100vh;overflow-x:hidden;font-size:13px}

/* ════════════ LOGIN PAGE ════════════ */
#loginPage{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(150deg,#f5c8d8 0%,#fce8ee 40%,#f0b8c8 80%,#fce8ee 100%);
  position:relative;overflow:hidden;
}
.login-petals{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:0}
.petal{position:absolute;top:-50px;opacity:0;font-size:var(--sz,16px);animation:floatDown var(--dur,6s) var(--del,0s) infinite ease-in-out}
@keyframes floatDown{0%{opacity:0;transform:translateY(0) rotate(0deg)}8%{opacity:1}85%{opacity:.7}100%{opacity:0;transform:translateY(110vh) rotate(400deg)}}
.login-card{
  position:relative;z-index:1;width:90%;max-width:340px;
  background:rgba(255,248,250,0.88);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border:1.5px solid rgba(255,255,255,.85);
  border-radius:24px;padding:32px 28px;text-align:center;
  box-shadow:0 20px 60px rgba(201,79,106,.18);
  animation:cardIn .5s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes cardIn{from{opacity:0;transform:scale(.88) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
.login-icon{font-size:32px;display:block;margin-bottom:10px;animation:sway 3s ease-in-out infinite}
@keyframes sway{0%,100%{transform:rotate(-6deg)}50%{transform:rotate(6deg)}}
.login-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--pink-deep);margin-bottom:4px}
.login-sub{font-size:12px;color:var(--muted);margin-bottom:22px}
.login-field{margin-bottom:12px;text-align:left}
.login-field label{display:block;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.login-field input{
  width:100%;background:#fff;border:1.5px solid var(--border);border-radius:10px;
  color:var(--text);font-family:'Lato',sans-serif;font-size:14px;
  padding:10px 14px;outline:none;transition:border-color .2s,box-shadow .2s;
}
.login-field input:focus{border-color:var(--pink);box-shadow:0 0 0 3px rgba(232,114,138,.12)}
.btn-login{
  width:100%;padding:12px;margin-top:4px;
  background:linear-gradient(135deg,var(--pink),var(--pink-deep));
  border:none;border-radius:12px;color:#fff;
  font-family:'Lato',sans-serif;font-size:13px;font-weight:400;
  letter-spacing:2px;text-transform:uppercase;cursor:pointer;
  transition:all .2s;box-shadow:0 6px 18px rgba(201,79,106,.35);
}
.btn-login:hover{transform:translateY(-1px);box-shadow:0 8px 22px rgba(201,79,106,.45)}
.btn-login:active{transform:scale(.98)}
.login-error{margin-top:10px;padding:8px 12px;background:var(--red-pale);border:1px solid var(--red-border);border-radius:8px;font-size:12px;color:var(--red);display:none}
.login-error.show{display:block}

/* ════════════ DASHBOARD ════════════ */
#dashboardPage{display:none;min-height:100vh;flex-direction:column}
#dashboardPage.show{display:flex}

/* HEADER */
.admin-header{
  background:linear-gradient(135deg,var(--pink-deep),var(--ribbon));
  padding:14px 16px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
  box-shadow:0 2px 12px rgba(201,79,106,.3);
}
.header-left{display:flex;align-items:center;gap:10px}
.header-logo{font-size:22px}
.header-title{font-family:'Playfair Display',serif;color:#fff;font-size:16px;font-weight:700;line-height:1.1}
.header-sub{font-size:10px;color:rgba(255,255,255,.7);letter-spacing:1.5px;text-transform:uppercase}
.btn-logout{background:rgba(255,255,255,.2);border:1.5px solid rgba(255,255,255,.4);border-radius:8px;color:#fff;font-family:'Lato',sans-serif;font-size:11px;padding:6px 12px;cursor:pointer;transition:all .15s;letter-spacing:.5px}
.btn-logout:hover{background:rgba(255,255,255,.3)}

/* MAIN TABS */
.main-tabs{display:flex;background:#fff;border-bottom:2px solid var(--border)}
.main-tab{flex:1;padding:12px 6px;text-align:center;font-size:12px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);cursor:pointer;border:none;background:none;font-family:'Lato',sans-serif;transition:all .15s;border-bottom:3px solid transparent;margin-bottom:-2px}
.main-tab.active{color:var(--pink-deep);border-bottom-color:var(--pink-deep);font-weight:700}
.main-tab:hover:not(.active){color:var(--pink);background:var(--pink-light)}

/* STATS */
.stats-bar{padding:12px 14px;background:var(--pink-light);border-bottom:1px solid var(--border);display:flex;gap:8px;overflow-x:auto}
.stat-chip{flex-shrink:0;background:#fff;border:1.5px solid var(--border);border-radius:12px;padding:8px 14px;text-align:center;min-width:72px}
.stat-chip .sn{font-size:20px;font-weight:700;color:var(--pink-deep);display:block;line-height:1}
.stat-chip .sl{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-top:2px}
.stat-chip.confirmed .sn{color:var(--green)}
.stat-chip.declined .sn{color:var(--red)}
.stat-chip.no-ss .sn{color:var(--orange)}

/* FILTER TABS */
.filter-tabs{padding:10px 14px 0;display:flex;gap:6px;overflow-x:auto;background:#fff;border-bottom:1px solid var(--border)}
.tab-btn{
  flex-shrink:0;padding:7px 14px;border-radius:10px 10px 0 0;border:1.5px solid var(--border);
  border-bottom:none;background:var(--pink-light);color:var(--muted);
  font-family:'Lato',sans-serif;font-size:11px;letter-spacing:1px;text-transform:uppercase;
  cursor:pointer;transition:all .15s;font-weight:400;
}
.tab-btn.active{background:var(--pink-deep);color:#fff;border-color:var(--pink-deep)}
.tab-btn:hover:not(.active){background:var(--pink-pale);color:var(--pink-deep)}

/* BOOKINGS LIST */
.bookings-area{flex:1;padding:12px 14px;display:flex;flex-direction:column;gap:10px}
.empty-state{text-align:center;padding:50px 20px;color:var(--muted)}
.empty-state .ei{font-size:40px;display:block;margin-bottom:10px}
.empty-state p{font-size:14px;line-height:1.6}
